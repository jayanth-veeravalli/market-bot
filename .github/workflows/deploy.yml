name: Deploy to GCP

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCP_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env to VM
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} "sudo tee /opt/market-bot/.env > /dev/null" << 'EOF'
          ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET=${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL=${{ secrets.ALPACA_BASE_URL }}
          DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF

      - name: Pull latest code
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} "
            sudo git config --global --add safe.directory /opt/market-bot &&
            cd /opt/market-bot &&
            sudo git pull origin main
          "

      - name: Install dependencies
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} "
            cd /opt/market-bot &&
            sudo /root/.local/bin/uv sync
          "

      - name: Run migrations
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} "
            cd /opt/market-bot &&
            sudo /root/.local/bin/uv run alembic upgrade head
          "

      - name: Restart service
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} "
            sudo systemctl restart market-bot
          "

      - name: Verify bot is running
        run: |
          ssh ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} "
            sudo systemctl is-active market-bot
          "
